[env:lolin_c3_mini]
platform = espressif32 @ 6.6.0
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200

build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    
    -D TFT_MOSI=6   
    -D TFT_SCLK=4    
    -D TFT_MISO=5    
    -D TFT_CS=7 
    -D TFT_DC=3
    -D TFT_RST=1
    
    -D SPI_FREQUENCY=40000000 

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ 8.3.11